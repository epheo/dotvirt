# File-Based Catalog source of truth (opm `basic` template). `make catalog` renders
# this into catalog/dotvirt-operator/catalog.yaml by pulling each olm.bundle image and
# expanding its properties. The channel graph (replaces) lives here, in git — the
# committed bundle no longer relies on `run bundle-upgrade` to inject the edge.
schema: olm.template.basic
entries:
  - schema: olm.package
    name: dotvirt-operator
    defaultChannel: alpha
  - schema: olm.channel
    package: dotvirt-operator
    name: alpha # released versions only — the channel external consumers subscribe to
    entries:
      - name: dotvirt-operator.v0.0.6
        replaces: dotvirt-operator.v0.0.5
  - schema: olm.channel
    package: dotvirt-operator
    name: candidate # release-candidates + releases — the QA/preview channel (hetznet)
    entries:
      - name: dotvirt-operator.v0.0.6
        replaces: dotvirt-operator.v0.0.5
  - schema: olm.bundle
    image: quay.io/epheo/dotvirt-operator-bundle@sha256:42bbdf94bbf0fc516d72e7a6a7221dfb8ea24e6a2c3997bd5cf12cc0bdcd30e4
