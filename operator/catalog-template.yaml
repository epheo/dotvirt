# File-Based Catalog source of truth (opm `basic` template). `make catalog` renders
# this into catalog/dotvirt-operator/catalog.yaml by pulling each olm.bundle image and
# expanding its properties. The channel graph (replaces) lives here, in git — the
# committed bundle no longer relies on `run bundle-upgrade` to inject the edge.
schema: olm.template.basic
entries:
  - schema: olm.package
    name: dotvirt-operator
    defaultChannel: stable-v0
  - schema: olm.channel
    package: dotvirt-operator
    name: stable-v0 # released versions only — the channel external consumers subscribe to
    entries:
      - name: dotvirt-operator.v0.0.13
        replaces: dotvirt-operator.v0.0.12
  - schema: olm.channel
    package: dotvirt-operator
    name: candidate-v0 # release-candidates + releases — the QA/preview channel (hetznet)
    entries:
      - name: dotvirt-operator.v0.0.13
        replaces: dotvirt-operator.v0.0.12
  - schema: olm.bundle
    image: quay.io/epheo/dotvirt-operator-bundle@sha256:dc56c58199bc4784d89a0aa2dbe0a23b5c2f23111c5227c6b6ecbe3b8d9f9f96
