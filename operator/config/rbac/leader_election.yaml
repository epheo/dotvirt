# Leader-election permissions (namespaced), for HA with --leader-elect.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dotvirt-operator-leader-election
  namespace: dotvirt-operator
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dotvirt-operator-leader-election
  namespace: dotvirt-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dotvirt-operator-leader-election
subjects:
  - kind: ServiceAccount
    name: dotvirt-operator-controller
    namespace: dotvirt-operator
