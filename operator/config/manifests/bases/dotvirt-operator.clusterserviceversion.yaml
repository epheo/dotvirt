apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    capabilities: Seamless Upgrades
    categories: Developer Tools, Modernization & Migration
    description: Installs dotvirt — a vCenter-like GitOps WebUI for KubeVirt — with
      its platform/tenant tier.
  name: dotvirt-operator.v0.0.0
spec:
  apiservicedefinitions: {}
  customresourcedefinitions: {}
  description: |
    The dotvirt operator provisions a complete dotvirt install from a single
    `Dotvirt` resource: the workload + Route/Ingress, the RBAC, the ArgoCD
    AppProject tier + ApplicationSet, the platform git repo (and optionally a
    self-hosted Forgejo), repo-credentials, and an org-level instant-sync webhook.

    dotvirt's runtime owns nothing — it reads git/cluster/Argo and proposes PRs,
    riding the user's RBAC. This operator is only the install-time provisioner.

    Prerequisites: ArgoCD (OpenShift GitOps) and KubeVirt; OVN-Kubernetes, NMState,
    and CDI unlock networking and image upload.
  displayName: dotvirt operator
  icon:
  - base64data: 
    mediatype: image/svg+xml
  install:
    spec:
      deployments: null
    strategy: ""
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - kubevirt
  - gitops
  - argocd
  - virtualization
  - vcenter
  - openshift
  links:
  - name: Source
    url: https://github.com/epheo/dotvirt
  maturity: alpha
  minKubeVersion: 1.30.0
  provider:
    name: epheo
  relatedImages:
  - image: quay.io/epheo/dotvirt@sha256:40242961bfc6674dcbd6aa9d5793a5d23914410d4c80ac3ce9320db05d3856bf
    name: dotvirt
  - image: quay.io/epheo/dotvirt-operator@sha256:222d794d99c6a18fb48bfc3d164a45c8f400c666ab31b5d262596aa3db0dd184
    name: dotvirt-operator
  replaces: dotvirt-operator.v0.0.3
  version: 0.0.0
