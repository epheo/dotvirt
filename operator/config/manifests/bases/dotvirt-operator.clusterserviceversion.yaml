apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    capabilities: Seamless Upgrades
    categories: Developer Tools, Modernization & Migration
    containerImage: quay.io/epheo/dotvirt-operator@sha256:b3d0dc4e077c932650ee84039f50bd627c0a598692bbad6af01c8cb97dc7abfe
    description: Installs dotvirt — a vCenter-like GitOps WebUI for KubeVirt — with
      its platform/tenant tier.
    repository: https://github.com/epheo/dotvirt
    support: https://github.com/epheo/dotvirt/issues
  labels:
    operatorframework.io/arch.amd64: supported
    operatorframework.io/arch.arm64: supported
    operatorframework.io/os.linux: supported
  name: dotvirt-operator.v0.0.0
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: A dotvirt install — the workload + Route/Ingress, RBAC, the ArgoCD
        AppProject tier + ApplicationSet, the platform git repo, and (optionally)
        a self-hosted Forgejo.
      displayName: dotvirt
      kind: Dotvirt
      name: dotvirts.dotvirt.io
      resources:
      - kind: Deployment
        name: ""
        version: v1
      - kind: Service
        name: ""
        version: v1
      - kind: Route
        name: ""
        version: v1
      specDescriptors:
      - description: dotvirt app image to deploy. Defaults to the operator's pinned
          digest, so an operator upgrade rolls the app; set only to override.
        displayName: App Image
        path: image
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:text
      - description: Git forge holding the platform repo — its URL and platform repo,
          the credentials secret, and whether the operator self-hosts a Forgejo.
        displayName: Forge
        path: forge
      - description: The ArgoCD (OpenShift GitOps) instance dotvirt drives — its namespace
          and application-controller service account.
        displayName: ArgoCD
        path: argocd
      - description: How the UI is exposed — a Route on OpenShift or an Ingress on
          vanilla Kubernetes — and at which host.
        displayName: Ingress
        path: ingress
      - description: Prometheus/Thanos query API backing the Performance tab.
        displayName: Metrics
        path: metrics
      statusDescriptors:
      - displayName: Phase
        path: phase
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:text
      - displayName: Conditions
        path: conditions
        x-descriptors:
        - urn:alm:descriptor:io.kubernetes.conditions
      version: v1alpha1
  description: |
    The dotvirt operator provisions a complete dotvirt install from a single
    `Dotvirt` resource: the workload + Route/Ingress, the RBAC, the ArgoCD
    AppProject tier + ApplicationSet, the platform git repo (and optionally a
    self-hosted Forgejo), repo-credentials, and an org-level instant-sync webhook.

    dotvirt's runtime owns nothing — it reads git/cluster/Argo and proposes PRs,
    riding the user's RBAC. This operator is only the install-time provisioner.

    Prerequisites: ArgoCD (OpenShift GitOps) and KubeVirt; OVN-Kubernetes, NMState,
    and CDI unlock networking and image upload.
  displayName: dotvirt operator
  icon:
  - base64data: 
    mediatype: image/svg+xml
  install:
    spec:
      deployments: null
    strategy: ""
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - kubevirt
  - gitops
  - argocd
  - virtualization
  - vcenter
  - openshift
  links:
  - name: Source
    url: https://github.com/epheo/dotvirt
  - name: Documentation
    url: https://github.com/epheo/dotvirt/blob/main/README.md
  - name: Operator
    url: https://github.com/epheo/dotvirt/blob/main/operator/README.md
  maintainers:
  - email: github@epheo.eu
    name: epheo
  maturity: alpha
  minKubeVersion: 1.30.0
  provider:
    name: epheo
  version: 0.0.0
