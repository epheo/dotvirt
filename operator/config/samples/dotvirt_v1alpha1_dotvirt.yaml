# A sample Dotvirt install. Replace the example.com hosts with your cluster's apps
# domain, then apply into the namespace dotvirt runs in; the operator provisions the
# rest. Under `make run ARGS=-dry-run` nothing is persisted — the API server just
# validates the rendered resources.
apiVersion: dotvirt.io/v1alpha1
kind: Dotvirt
metadata:
  name: dotvirt
  namespace: dotvirt
spec:
  # No image pin: the operator deploys its built-in (digest-pinned) DefaultImage,
  # so an OLM operator upgrade rolls the app. Set spec.image only to override.
  forge:
    managed: true # the operator deploys + bootstraps Forgejo and generates its token
    url: https://forgejo.apps.example.com # exposed via Route at this host
    platformRepo: https://forgejo.apps.example.com/dotvirt/platform.git
    credentialsSecret: dotvirt-forge # the operator WRITES the generated token here
    insecureTLS: true # the bundled Forgejo Route is self-signed
  argocd:
    namespace: openshift-gitops
    controllerServiceAccount: openshift-gitops-argocd-application-controller
  ingress:
    type: auto # Route on OpenShift, Ingress on vanilla
    host: dotvirt.apps.example.com
  metrics:
    url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
