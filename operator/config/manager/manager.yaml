apiVersion: v1
kind: Namespace
metadata:
  name: dotvirt-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotvirt-operator-controller
  namespace: dotvirt-operator
  labels: {app: dotvirt-operator}
spec:
  replicas: 1
  selector:
    matchLabels: {app: dotvirt-operator}
  template:
    metadata:
      labels: {app: dotvirt-operator}
    spec:
      serviceAccountName: dotvirt-operator-controller
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: quay.io/epheo/dotvirt-operator:v0.0.25
          args: ["--leader-elect", "--health-probe-bind-address=:8081"]
          # Operand images, digest-pinned. The operator reads these to decide what to deploy
          # (RELATED_IMAGE_* convention), so an operand is overridable per-install via the
          # operator's env, and operator-manifest-tools derives the bundle's spec.relatedImages
          # from them — what disconnected mirroring (oc adm catalog mirror + an
          # ImageDigestMirrorSet) redirects by digest. DOTVIRT is re-pinned each release;
          # FORGEJO is static (bumped only when the upstream :11-rootless tag moves).
          env:
            - name: RELATED_IMAGE_DOTVIRT
              value: quay.io/epheo/dotvirt@sha256:a4af06a33751d193a69e2f8e86fda42c5f26749ce0f06c5bb9756bfb5cf98e03
            - name: RELATED_IMAGE_FORGEJO
              value: codeberg.org/forgejo/forgejo:11-rootless@sha256:5135f11de848bea6d59c0a96688e90c361380ba102bdc08dbd5aa52cca2b179b
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          livenessProbe:
            httpGet: {path: /healthz, port: 8081}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: {path: /readyz, port: 8081}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: {cpu: 10m, memory: 64Mi}
            limits: {memory: 256Mi}
