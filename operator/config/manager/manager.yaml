apiVersion: v1
kind: Namespace
metadata:
  name: dotvirt-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotvirt-operator-controller
  namespace: dotvirt-operator
  labels: {app: dotvirt-operator}
spec:
  replicas: 1
  selector:
    matchLabels: {app: dotvirt-operator}
  template:
    metadata:
      labels: {app: dotvirt-operator}
    spec:
      serviceAccountName: dotvirt-operator-controller
      # Pull credential for the private registry the operator + app images live in.
      # Provide it in the operator's namespace (create out-of-band, e.g. copy
      # dotvirt-regcred); harmless if absent for a public registry.
      imagePullSecrets:
        - name: dotvirt-regcred
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 10
      containers:
        - name: manager
          image: registry.desku.be/dotvirt-operator:latest
          args: ["--leader-elect", "--health-probe-bind-address=:8081"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          livenessProbe:
            httpGet: {path: /healthz, port: 8081}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: {path: /readyz, port: 8081}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: {cpu: 10m, memory: 64Mi}
            limits: {memory: 256Mi}
