# Self-hosted dotvirt operator catalog, pinned by immutable digest (== :v0.0.4). To
# publish a release, bump .spec.image to the new catalog's digest; OLM then upgrades
# subscribers within installPlanApproval.
apiVersion: operators.coreos.com/v1alpha1
kind: CatalogSource
metadata:
  name: dotvirt-catalog
  # openshift-marketplace so the operator shows in the OperatorHub UI (that's the
  # namespace the console aggregates catalogs from).
  namespace: openshift-marketplace
spec:
  sourceType: grpc
  image: quay.io/epheo/dotvirt-operator-catalog@sha256:102d938ce6faf8443e117b8051b63a374a04cd0fd9170e53e7e0067c988de8b5
  displayName: dotvirt
  publisher: epheo
