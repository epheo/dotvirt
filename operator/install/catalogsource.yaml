# Self-hosted dotvirt operator catalog, pinned by immutable digest (hack/release.sh repins
# it per release — the digest is the source of truth, not a tag). To publish a release, bump
# .spec.image to the new catalog's digest; OLM then upgrades subscribers within installPlanApproval.
apiVersion: operators.coreos.com/v1alpha1
kind: CatalogSource
metadata:
  name: dotvirt-catalog
  # openshift-marketplace so the operator shows in the OperatorHub UI (that's the
  # namespace the console aggregates catalogs from).
  namespace: openshift-marketplace
spec:
  sourceType: grpc
  image: quay.io/epheo/dotvirt-operator-catalog@sha256:ffbce21ab9a1b0df167c17f52873cc2169394ab5969bb48e7c05b37f863bc3cc
  displayName: dotvirt
  publisher: epheo
