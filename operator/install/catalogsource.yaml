# Self-hosted dotvirt operator catalog, pinned by immutable digest (== :v0.0.4). To
# publish a release, bump .spec.image to the new catalog's digest; OLM then upgrades
# subscribers within installPlanApproval.
apiVersion: operators.coreos.com/v1alpha1
kind: CatalogSource
metadata:
  name: dotvirt-catalog
  namespace: dotvirt-olm
spec:
  sourceType: grpc
  image: quay.io/epheo/dotvirt-operator-catalog@sha256:d8285df9b23ce51f6f8dc8cd8d6ef1af42c554a5426bf1685e401635857ba04d
  displayName: dotvirt
  publisher: epheo
