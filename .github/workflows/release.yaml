# Cut a digest-pinned OLM release. Runs hack/release.sh (build + push app, operator,
# bundle, catalog to quay.io/epheo, each pinned by immutable @sha256 digest), then opens
# a PR recording the digest pins. Branch protection means the pins land via that PR, not
# the tagged commit — the tag marks intent, the merged PR is the record.
#
# Triggered two ways: push a `v*` tag (VERSION from the tag, PREV = the current
# alpha-channel head in operator/catalog-template.yaml — no manual input, so it can't
# drift), or workflow_dispatch for re-runs / overrides with an explicit version + prev.
# Runs in the `QUAY` environment (QUAY_USERNAME / QUAY_PASSWORD push secrets).
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, x.y.z"
        required: true
      prev:
        description: "Version this release replaces, x.y.z"
        required: true

env:
  GOTOOLCHAIN: auto

jobs:
  release:
    runs-on: ubuntu-latest
    environment: QUAY
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Load pinned tool versions
        run: grep -v '^#' hack/versions.env >> "$GITHUB_ENV"
      - name: Resolve version + prev
        run: |
          source hack/lib.sh   # current_alpha_head + repo-root cd
          if [ "${{ github.event_name }}" = push ]; then
            ver="${GITHUB_REF_NAME#v}"            # tag v1.2.3 -> 1.2.3
            prev="$(current_alpha_head || true)"  # what it replaces — the alpha head recorded in git
          else
            ver="${{ inputs.version }}"; prev="${{ inputs.prev }}"
          fi
          [ -n "$ver" ] && [ -n "$prev" ] || { echo "::error::could not resolve version/prev (ref=$GITHUB_REF_NAME)"; exit 1; }
          { echo "REL_VERSION=$ver"; echo "REL_PREV=$prev"; } >> "$GITHUB_ENV"
          echo "Releasing v$ver (replaces v$prev)"
      - name: Install skopeo + operator-sdk
        run: |
          sudo apt-get update && sudo apt-get install -y skopeo
          sudo curl -fsSL -o /usr/local/bin/operator-sdk \
            "https://github.com/operator-framework/operator-sdk/releases/download/$OPERATOR_SDK_VERSION/operator-sdk_linux_amd64"
          sudo chmod +x /usr/local/bin/operator-sdk
      - name: Registry login (docker + skopeo)
        env:
          U: ${{ secrets.QUAY_USERNAME }}
          P: ${{ secrets.QUAY_PASSWORD }}
        run: |
          echo "$P" | docker login quay.io -u "$U" --password-stdin
          echo "$P" | skopeo login quay.io -u "$U" --password-stdin
      - uses: docker/setup-qemu-action@v3   # emulation for the catalog image's arm64 cache-build RUN
      - uses: docker/setup-buildx-action@v3
      - name: Cut release (build + push + digest-pin)
        run: VERSION="$REL_VERSION" PREV="$REL_PREV" CONTAINER_TOOL=docker ./hack/release.sh
      - name: Open digest-pin PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "dotvirt-release[bot]"
          git config user.email "dotvirt-release[bot]@users.noreply.github.com"
          branch="release-v$REL_VERSION"
          git switch -c "$branch"
          git commit -am "release v$REL_VERSION: digest-pinned (replaces v$REL_PREV)"
          git push -u origin "$branch"
          gh pr create --base main --head "$branch" \
            --title "release v$REL_VERSION" \
            --body "Digest-pinned release cut by CI; images already pushed to quay.io/epheo. Merge to record the pins, then apply operator/install/catalogsource.yaml."
