# Cut a digest-pinned OLM release. Runs hack/release.sh (build + push app, operator,
# bundle, catalog to quay.io/epheo, each pinned by immutable @sha256 digest), then
# opens a PR recording the digest pins. Manual trigger — the dance is stateful, so a
# maintainer picks the version + the version it replaces. Runs in the `QUAY`
# environment (QUAY_USERNAME / QUAY_PASSWORD push secrets).
name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, x.y.z"
        required: true
      prev:
        description: "Version this release replaces, x.y.z"
        required: true

env:
  GOTOOLCHAIN: auto

jobs:
  release:
    runs-on: ubuntu-latest
    environment: QUAY
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install skopeo + operator-sdk
        run: |
          sudo apt-get update && sudo apt-get install -y skopeo
          sudo curl -fsSL -o /usr/local/bin/operator-sdk \
            https://github.com/operator-framework/operator-sdk/releases/download/v1.42.2/operator-sdk_linux_amd64
          sudo chmod +x /usr/local/bin/operator-sdk
      - name: Registry login (docker + skopeo)
        env:
          U: ${{ secrets.QUAY_USERNAME }}
          P: ${{ secrets.QUAY_PASSWORD }}
        run: |
          echo "$P" | docker login quay.io -u "$U" --password-stdin
          echo "$P" | skopeo login quay.io -u "$U" --password-stdin
      - name: Cut release (build + push + digest-pin)
        run: VERSION=${{ inputs.version }} PREV=${{ inputs.prev }} CONTAINER_TOOL=docker ./hack/release.sh
      - name: Open digest-pin PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "dotvirt-release[bot]"
          git config user.email "dotvirt-release[bot]@users.noreply.github.com"
          branch="release-v${{ inputs.version }}"
          git switch -c "$branch"
          git commit -am "release v${{ inputs.version }}: digest-pinned (replaces v${{ inputs.prev }})"
          git push -u origin "$branch"
          gh pr create --fill \
            --title "release v${{ inputs.version }}" \
            --body "Digest-pinned release cut by CI; images already pushed to quay.io/epheo. Merge to record the pins, then apply operator/install/catalogsource.yaml."
