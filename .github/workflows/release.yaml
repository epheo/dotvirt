# Release pipeline: on a vX.Y.Z tag, build + push the operator, bundle, and catalog
# (the app image rides ci.yaml on main). Runs in the `QUAY` environment, which holds
# the QUAY_USERNAME / QUAY_PASSWORD push secrets.
#
# Digest discipline: the tag is cut from a commit whose CSV/DefaultImage already
# carry the immutable @sha256 digests (set during the release commit — see the
# `make` digest dance in operator/Makefile). This job publishes the artifacts that
# match that commit; it does not float tags.
name: release

on:
  push:
    tags: ['v*']

env:
  GOTOOLCHAIN: auto

jobs:
  release:
    runs-on: ubuntu-latest
    environment: QUAY # GitHub Actions environment holding the QUAY_* push secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Install operator-sdk
        run: |
          curl -fsSL -o /usr/local/bin/operator-sdk \
            https://github.com/operator-framework/operator-sdk/releases/download/v1.42.2/operator-sdk_linux_amd64
          chmod +x /usr/local/bin/operator-sdk
      - name: Version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: App image
        run: make push TAG="${GITHUB_SHA::7}"
      - name: Operator image
        working-directory: operator
        run: |
          make docker-build IMG="quay.io/epheo/dotvirt-operator:${GITHUB_SHA::7}"
          docker push "quay.io/epheo/dotvirt-operator:${GITHUB_SHA::7}"
      - name: Bundle + catalog
        working-directory: operator
        run: |
          make bundle VERSION="$VERSION"
          make bundle-build bundle-push VERSION="$VERSION"
          make catalog catalog-build catalog-push VERSION="$VERSION"
      - name: Validate
        working-directory: operator
        run: operator-sdk bundle validate ./bundle
