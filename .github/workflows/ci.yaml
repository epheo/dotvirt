# GitHub Actions CI. The `image` job runs in the `QUAY` environment, which holds the
# secrets QUAY_USERNAME / QUAY_PASSWORD (push credentials for quay.io/epheo).
name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE: quay.io/epheo/dotvirt
  GOTOOLCHAIN: auto # go.mod pins 1.26.4; let the toolchain download

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
        env: { GOFLAGS: -buildvcs=false }
      - run: go test ./...
        env: { GOFLAGS: -buildvcs=false }

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run check
        working-directory: web
      - run: npm run build
        working-directory: web

  # Merge gate: build both images (no push) + validate the OLM artifacts, so a broken
  # Containerfile/Dockerfile, stale generated manifest, or invalid CSV/catalog fails
  # the PR instead of main. Uses no secrets, so it also runs on fork PRs.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build images (no push)
        run: |
          docker build -f Containerfile -t dotvirt:pr .
          docker build -f operator/Dockerfile -t dotvirt-operator:pr .
      - name: Generated manifests in sync
        run: |
          make -C operator manifests generate
          git diff --exit-code -- operator/api operator/config/crd operator/config/rbac \
            || { echo "::error::stale generated manifests — run 'make -C operator manifests generate' and commit"; exit 1; }
      - name: Validate bundle + catalog
        run: |
          sudo curl -fsSL -o /usr/local/bin/operator-sdk \
            https://github.com/operator-framework/operator-sdk/releases/download/v1.42.2/operator-sdk_linux_amd64
          sudo chmod +x /usr/local/bin/operator-sdk
          operator-sdk bundle validate ./operator/bundle
          go run github.com/operator-framework/operator-registry/cmd/opm@v1.51.0 validate operator/catalog

  # App image build+push, main only — deploy/operator pin the immutable digest of
  # the short-sha tag this publishes.
  image:
    if: github.ref == 'refs/heads/main'
    needs: [go, web]
    runs-on: ubuntu-latest
    environment: QUAY # GitHub Actions environment holding the QUAY_* push secrets
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Build & push
        # Push the immutable per-commit SHA tag only — never a moving :latest (a
        # moving tag orphans the digests that DefaultImage/relatedImages pin to).
        run: |
          docker build -f Containerfile -t "$IMAGE:${GITHUB_SHA::7}" .
          docker push "$IMAGE:${GITHUB_SHA::7}"
