# GitHub Actions CI. The `image` job runs in the `QUAY` environment, which holds the
# secrets QUAY_USERNAME / QUAY_PASSWORD (push credentials for quay.io/epheo).
name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE: quay.io/epheo/dotvirt
  GOTOOLCHAIN: auto # go.mod pins 1.26.4; let the toolchain download

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
        env: { GOFLAGS: -buildvcs=false }
      - run: go test ./...
        env: { GOFLAGS: -buildvcs=false }
      # The operator is a SEPARATE module (operator/go.mod), so the root `go test ./...`
      # above doesn't reach it — vet + test it explicitly.
      - run: go vet ./... && go test ./...
        working-directory: operator
        env: { GOFLAGS: -buildvcs=false }

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: grep -v '^#' hack/versions.env >> "$GITHUB_ENV"
      # Both modules share .golangci.yml (resolved by walking up from operator/).
      - uses: golangci/golangci-lint-action@v8
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
        env: { GOFLAGS: -buildvcs=false }
      - uses: golangci/golangci-lint-action@v8
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: operator
        env: { GOFLAGS: -buildvcs=false }

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run format:check
        working-directory: web
      - run: npm run check
        working-directory: web
      - run: npm run build
        working-directory: web

  # Merge gate: build both images (no push) + validate the OLM artifacts, so a broken
  # Containerfile/Dockerfile, stale generated manifest, or invalid CSV/catalog fails
  # the PR instead of main. Uses no secrets, so it also runs on fork PRs.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Load pinned tool versions
        run: grep -v '^#' hack/versions.env >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - name: Build images (multi-arch, no push)
        # Cross-build both release arches so a broken arm64 cross-compile fails the PR, not
        # the release. No --push/--load: buildx just validates the build graph.
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -f Containerfile .
          docker buildx build --platform linux/amd64,linux/arm64 -f operator/Dockerfile .
      - name: Generated manifests in sync
        run: |
          make -C operator manifests generate
          git diff --exit-code -- operator/api operator/config/crd operator/config/rbac \
            || { echo "::error::stale generated manifests — run 'make -C operator manifests generate' and commit"; exit 1; }
      - name: Generated TS model in sync
        run: |
          go run "github.com/gzuidhof/tygo@$TYGO_VERSION" generate
          git diff --exit-code -- web/src/lib/model.gen.ts \
            || { echo "::error::stale web/src/lib/model.gen.ts — run 'make types' and commit"; exit 1; }
      - name: Validate bundle + catalog
        run: |
          sudo curl -fsSL -o /usr/local/bin/operator-sdk \
            "https://github.com/operator-framework/operator-sdk/releases/download/$OPERATOR_SDK_VERSION/operator-sdk_linux_amd64"
          sudo chmod +x /usr/local/bin/operator-sdk
          operator-sdk bundle validate ./operator/bundle --select-optional suite=operatorframework
          go run "github.com/operator-framework/operator-registry/cmd/opm@$OPM_VERSION" validate operator/catalog
      - name: Committed bundle in sync
        # operator/bundle is generated from operator/config by `make bundle`, and nothing
        # else keeps them in sync — regenerate at the committed CSV's version and fail on
        # drift. createdAt is a generation timestamp, not content, so it's ignored (the
        # community-operators pipelines do the same). Uses the operator-sdk installed above.
        run: |
          VERSION="$(go run "github.com/mikefarah/yq/v4@$YQ_VERSION" '.spec.version' operator/bundle/manifests/dotvirt-operator.clusterserviceversion.yaml)"
          make -C operator bundle VERSION="$VERSION"
          git add -N operator # so newly generated files show in the diff
          git diff --exit-code -I'^    createdAt:' -- operator \
            || { echo "::error::stale bundle — run 'make -C operator bundle VERSION=$VERSION' and commit"; exit 1; }

  # Install the bundle on a throwaway kind cluster via OLM (à la community-operators
  # CI) + run scorecard, so a bundle that won't install fails the PR. The committed
  # bundle is pointed at THIS build's operator image (served from the kind-local
  # registry), so the job gates the diff; whether the published quay digests still
  # install is verify-published-bundle.yaml's subject, never a PR's. Everything else
  # the install path pulls is preloaded by olm-kind, so a red here means the bundle
  # broke — not that a registry hiccuped. No secrets, so it runs on fork PRs too.
  bundle-test:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/olm-kind
      - name: Build the operator image from this tree
        run: |
          docker build -f operator/Dockerfile -t localhost:5000/dotvirt-operator:ci .
          docker push localhost:5000/dotvirt-operator:ci
      - name: Point the bundle at the freshly built image
        # Swap only the manager image ref — the bundle otherwise stays exactly what
        # validate proved in sync with operator/config.
        run: |
          sed -i -E 's#quay\.io/epheo/dotvirt-operator@sha256:[0-9a-f]+#localhost:5000/dotvirt-operator:ci#g' \
            operator/bundle/manifests/dotvirt-operator.clusterserviceversion.yaml
      - name: Build + push the bundle to the local registry
        run: make -C operator bundle-build bundle-push BUNDLE_IMG=localhost:5000/dotvirt-operator-bundle:ci CONTAINER_TOOL=docker
      - name: Render + push a CI catalog serving that bundle
        # The same install mechanism as production and the canary — a catalog image
        # (opm pinned via build-arg, catalog.Dockerfile) behind a CatalogSource — not
        # operator-sdk's ephemeral `run bundle` registry pod, whose unpinned
        # opm:latest/ubi machinery is a recurring flake source.
        run: |
          sudo curl -fsSL -o /usr/local/bin/opm \
            "https://github.com/operator-framework/operator-registry/releases/download/$OPM_VERSION/linux-amd64-opm"
          sudo chmod +x /usr/local/bin/opm
          CSV_NAME="$(awk '/^  name: dotvirt-operator\.v/{print $2; exit}' operator/bundle/manifests/dotvirt-operator.clusterserviceversion.yaml)"
          echo "CSV_NAME=$CSV_NAME" >> "$GITHUB_ENV"
          cat > /tmp/ci-catalog-template.yaml <<EOF
          schema: olm.template.basic
          entries:
            - schema: olm.package
              name: dotvirt-operator
              defaultChannel: stable-v0
            - schema: olm.channel
              package: dotvirt-operator
              name: stable-v0
              entries:
                - name: $CSV_NAME
            - schema: olm.bundle
              image: localhost:5000/dotvirt-operator-bundle:ci
          EOF
          opm alpha render-template basic --use-http -o yaml /tmp/ci-catalog-template.yaml \
            > operator/catalog/dotvirt-operator/catalog.yaml
          opm validate operator/catalog
          docker build -f operator/catalog.Dockerfile --build-arg OPM_VERSION="$OPM_VERSION" \
            -t localhost:5000/dotvirt-operator-catalog:ci operator
          docker push localhost:5000/dotvirt-operator-catalog:ci
      - name: Install via OLM from the CI catalog (assert the CSV reaches Succeeded)
        run: |
          kubectl create namespace dotvirt-ci
          cat <<EOF | kubectl apply -f -
          apiVersion: operators.coreos.com/v1alpha1
          kind: CatalogSource
          metadata:
            name: dotvirt-catalog-ci
            namespace: dotvirt-ci
          spec:
            sourceType: grpc
            image: localhost:5000/dotvirt-operator-catalog:ci
          ---
          apiVersion: operators.coreos.com/v1
          kind: OperatorGroup
          metadata:
            name: dotvirt-ci
            namespace: dotvirt-ci
          spec: {}
          ---
          apiVersion: operators.coreos.com/v1alpha1
          kind: Subscription
          metadata:
            name: dotvirt-operator
            namespace: dotvirt-ci
          spec:
            channel: stable-v0
            name: dotvirt-operator
            source: dotvirt-catalog-ci
            sourceNamespace: dotvirt-ci
          EOF
          ./hack/wait-csv.sh dotvirt-ci dotvirt-operator "$CSV_NAME"
      - name: Scorecard (basic + olm)
        run: operator-sdk scorecard ./operator/bundle --wait-time 180s

  # App image build+push, main only — deploy/operator pin the immutable digest of
  # the short-sha tag this publishes.
  image:
    if: github.ref == 'refs/heads/main'
    needs: [go, web]
    runs-on: ubuntu-latest
    environment: QUAY # GitHub Actions environment holding the QUAY_* push secrets
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - uses: docker/setup-buildx-action@v3
      - name: Build & push (multi-arch)
        # Push the immutable per-commit SHA tag only — never a moving :latest (a moving tag
        # orphans the digests that DefaultImage/relatedImages pin to). Multi-arch so arm64
        # nodes (e.g. hetznet) can run the per-commit image.
        run: docker buildx build --platform linux/amd64,linux/arm64 -f Containerfile -t "$IMAGE:${GITHUB_SHA::7}" --push .
