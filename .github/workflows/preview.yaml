# Cut a candidate-v0 preview (release-candidate) for QA — runs hack/preview.sh
# (build + push app/operator/bundle + a preview catalog, all digest-pinned, into the
# `candidate-v0` channel only; `stable-v0` is untouched, so it's never a published release).
# Uploads the preview CatalogSource as an artifact to apply on a candidate-v0
# cluster (hetznet). Runs in the `QUAY` environment.
name: preview

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release-candidate version, x.y.z-rc.N"
        required: true

env:
  GOTOOLCHAIN: auto

jobs:
  preview:
    runs-on: ubuntu-latest
    environment: QUAY
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Load pinned tool versions
        run: grep -v '^#' hack/versions.env >> "$GITHUB_ENV"
      - name: Install skopeo + operator-sdk
        run: |
          sudo apt-get update && sudo apt-get install -y skopeo
          sudo curl -fsSL -o /usr/local/bin/operator-sdk \
            "https://github.com/operator-framework/operator-sdk/releases/download/$OPERATOR_SDK_VERSION/operator-sdk_linux_amd64"
          sudo chmod +x /usr/local/bin/operator-sdk
      - name: Registry login (docker + skopeo)
        env:
          U: ${{ secrets.QUAY_USERNAME }}
          P: ${{ secrets.QUAY_PASSWORD }}
        run: |
          echo "$P" | docker login quay.io -u "$U" --password-stdin
          echo "$P" | skopeo login quay.io -u "$U" --password-stdin
      - uses: docker/setup-qemu-action@v3   # emulation for the catalog image's arm64 cache-build RUN
      - uses: docker/setup-buildx-action@v3
      - name: Cut preview
        run: VERSION=${{ inputs.version }} CONTAINER_TOOL=docker ./hack/preview.sh
      - uses: actions/upload-artifact@v4
        with:
          name: catalogsource-preview-${{ inputs.version }}
          path: operator/install/catalogsource-preview.yaml
