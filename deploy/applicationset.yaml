# One ArgoCD Application per dotvirt project, each syncing that project's git repo
# into that project's namespaces. This is the ONLY component that creates Argo
# Applications — dotvirt never does (it only SUPPLIES the project list).
#
#   Onboarding a project (platform/admin, once per tenant) — now just two steps:
#     1. Create the project's git repo (e.g. Forgejo dotvirt/<project>) with the
#        VMs on `main` and an (initially empty) `running` branch.
#     2. Label + annotate the project's namespace(s):
#          oc label    ns <ns> dotvirt.io/project=<project>
#          oc annotate ns <ns> dotvirt.io/repo=http://forge/dotvirt/<project>.git
#
# That's it — no manual ApplicationSet edit. dotvirt's resolver already discovers
# projects from these labels; the plugin generator below calls dotvirt's
# /api/v1/getparams.execute, which emits one {project, repo} element per repo-backed
# project. So one Application per project syncs the whole repo across that project's
# N labeled namespaces. Each runs in the `dotvirt-tenants` AppProject (see
# deploy/appprojects.yaml), which permits ONLY namespaced workloads (VMs + secondary
# networks): cluster-scoped + tenancy objects (Namespaces, CUDN, NNCP) are the
# platform tier's job — applied by the separate dotvirt-platform app from the
# `platform` repo — so a tenant repo physically cannot reconcile them. Labeling a
# namespace folds it into its project's existing app (within requeueAfterSeconds).
# dotvirt supplies the
# list under a shared token but STILL never creates the Application — the
# ApplicationSet does. Projects stay live cluster facts keyed on the project label.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dotvirt-projects
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  # Renaming the generated apps (per-namespace -> per-project) prunes the old
  # apps; preserve their resources so the rename ADOPTS the running VMs into the
  # new per-project apps instead of cascade-deleting + recreating them (downtime).
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - plugin:
        configMapRef:
          name: dotvirt-appset-plugin
        input:
          parameters: {}
        # Re-poll dotvirt so a newly-labeled namespace provisions within a minute.
        requeueAfterSeconds: 60
  template:
    metadata:
      name: "dotvirt-{{.project}}"
      labels:
        dotvirt.io/project: "{{.project}}"
    spec:
      # Tenant tier: namespaced workloads only (no CUDN/NNCP/Namespace). See
      # deploy/appprojects.yaml. Was `default` (unrestricted) — the change that
      # actually stops a tenant PR landing cluster-scoped infra.
      project: dotvirt-tenants
      source:
        repoURL: "{{.repo}}"
        targetRevision: main
        path: "." # the whole project repo: one app = one project = its N namespaces
        directory:
          recurse: true
          include: "*.yaml"
      destination:
        server: https://kubernetes.default.svc
        # No fixed namespace: every VM manifest carries its own. "default" is just
        # the fallback for any namespace-less doc (a tenant repo has none — its
        # cluster-scoped objects moved to the platform tier).
        namespace: default
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          # Namespaces are the platform tier's job now (the dotvirt-platform app
          # applies them from the `platform` repo); a tenant app may not create
          # them, so it must not auto-create its destination namespace — it syncs
          # into namespaces the platform already provisioned.
          - CreateNamespace=false
---
# Plugin-generator config: where to reach dotvirt + the shared bearer token (the
# token value is pulled from the Secret below via the $<secret-name>:<key> ref).
apiVersion: v1
kind: ConfigMap
metadata:
  name: dotvirt-appset-plugin
  namespace: openshift-gitops
data:
  baseUrl: "http://dotvirt.dotvirt.svc.cluster.local:8080"
  token: "$dotvirt-appset-plugin:token"
---
# The shared bearer the ApplicationSet presents to dotvirt's plugin endpoint lives
# in Secret dotvirt-appset-plugin (openshift-gitops, key `token`); the SAME value
# must reach dotvirt via DOTVIRT_APPSET_PLUGIN_TOKEN (the dotvirt-appset-plugin
# secret in the dotvirt namespace, consumed in deploy/dotvirt.yaml).
#
# Created OUT-OF-BAND and deliberately NOT a resource in this file: `oc apply -f`
# of this file would otherwise overwrite the live token with a placeholder and
# break the plugin generator with a 401. Create it once, shared across both
# namespaces:
#   TOKEN=$(openssl rand -hex 24)
#   oc create secret generic dotvirt-appset-plugin -n openshift-gitops --from-literal=token="$TOKEN"
#   oc create secret generic dotvirt-appset-plugin -n dotvirt          --from-literal=token="$TOKEN"
---
# Argo repo CREDENTIAL TEMPLATE (not a per-repo entry): one prefix-matched
# credential covers EVERY project repo dotvirt's plugin emits, so a newly-labeled
# project provisions hands-off — no per-repo secret. The url is the forge's
# owner-path prefix; Argo longest-prefix-matches it. Anonymous read works on these
# repos, so username/password are belt-and-braces (and cover private repos).
#
# TLS: the plugin emits the forge's external Route URL (browser-reachable, so the
# UI "Open repository" link works), whose cert is signed by the OpenShift ingress
# CA — not publicly trusted. Rather than `insecure: true` (which the repo-creds
# template does NOT honor), teach the ArgoCD repo-server to trust that CA, so the
# clone is verified:
#   oc extract configmap/default-ingress-cert -n openshift-config-managed --to=/tmp --confirm
#   oc create configmap argocd-tls-certs-cm -n openshift-gitops \
#     --from-file=forgejo.apps.hetznet.epheo.eu=/tmp/ca-bundle.crt --dry-run=client -o yaml | oc apply -f -
#   oc rollout restart deploy/openshift-gitops-repo-server -n openshift-gitops
# Also created OUT-OF-BAND (same clobber reason — not a resource here). Example:
#   oc create secret generic dotvirt-forge-creds -n openshift-gitops \
#     --from-literal=type=git \
#     --from-literal=url=https://forgejo.apps.hetznet.epheo.eu/dotvirt \
#     --from-literal=username=dotvirt --from-literal=password=<forge-token>
#   oc label secret dotvirt-forge-creds -n openshift-gitops \
#     argocd.argoproj.io/secret-type=repo-creds
