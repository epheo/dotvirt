# One ArgoCD Application per dotvirt project, each syncing that project's git repo
# into that project's namespaces. This is the ONLY component that creates Argo
# Applications — dotvirt never does (it only SUPPLIES the project list).
#
#   Onboarding a project (platform/admin, once per tenant) — now just two steps:
#     1. Create the project's git repo (e.g. Forgejo dotvirt/<project>) with the
#        VMs on `main` and an (initially empty) `running` branch.
#     2. Label + annotate the project's namespace(s):
#          oc label    ns <ns> dotvirt.io/project=<project>
#          oc annotate ns <ns> dotvirt.io/repo=http://forge/dotvirt/<project>.git
#
# That's it — no manual ApplicationSet edit. dotvirt's resolver already discovers
# projects from these labels; the plugin generator below calls dotvirt's
# /api/v1/getparams.execute, which emits one {project, repo, namespace} element per
# labeled namespace. So labeling a namespace dynamically provisions its Argo
# Application (within requeueAfterSeconds). dotvirt supplies the list under a shared
# token but STILL never creates the Application — the ApplicationSet does. Projects
# stay live cluster facts keyed on the namespace label.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dotvirt-projects
  namespace: openshift-gitops
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - plugin:
        configMapRef:
          name: dotvirt-appset-plugin
        input:
          parameters: {}
        # Re-poll dotvirt so a newly-labeled namespace provisions within a minute.
        requeueAfterSeconds: 60
  template:
    metadata:
      name: "dotvirt-{{.project}}-{{.namespace}}"
      labels:
        dotvirt.io/project: "{{.project}}"
    spec:
      project: default
      source:
        repoURL: "{{.repo}}"
        targetRevision: main
        path: "{{.namespace}}" # per-namespace directory in the project repo
        directory:
          recurse: true
          include: "*.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false # namespaces are pre-created + labeled by the platform
---
# Plugin-generator config: where to reach dotvirt + the shared bearer token (the
# token value is pulled from the Secret below via the $<secret-name>:<key> ref).
apiVersion: v1
kind: ConfigMap
metadata:
  name: dotvirt-appset-plugin
  namespace: openshift-gitops
data:
  baseUrl: "http://dotvirt.dotvirt.svc.cluster.local:8080"
  token: "$dotvirt-appset-plugin:token"
---
# The shared bearer the ApplicationSet presents to dotvirt's plugin endpoint. The
# SAME value must reach dotvirt via DOTVIRT_APPSET_PLUGIN_TOKEN (see the
# dotvirt-appset-plugin secret consumed in deploy/dotvirt.yaml). Replace the
# placeholder with a real secret before applying.
apiVersion: v1
kind: Secret
metadata:
  name: dotvirt-appset-plugin
  namespace: openshift-gitops
type: Opaque
stringData:
  token: "REPLACE-with-a-shared-secret"
