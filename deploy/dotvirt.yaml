# dotvirt itself: a single Deployment running the Go backend (which also serves
# the built SPA assets, or front it with the frontend's static host). Uses the
# `dotvirt` ServiceAccount from rbac.yaml for its background identity (TokenReview,
# SA reads, Argo re-sync). In-cluster, leave -kubeconfig empty: the SA token is
# read from the mounted volume.
#
# Secrets it needs (create out-of-band; NOT committed):
#   - forgejo creds (one SA token used to clone/push every project repo)
#   - a session-secret to sign cookies across restarts/replicas
apiVersion: v1
kind: Namespace
metadata:
  name: dotvirt
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotvirt
  namespace: dotvirt
spec:
  # Drafts are per-(user,project) files persisted to the PVC below, so a single
  # replica keeps in-progress changesets across restarts. To scale to >1, switch
  # the PVC to ReadWriteMany so all replicas share the draft dir; the session
  # itself is stateless (the signed cookie holds the token).
  replicas: 1
  strategy: { type: Recreate } # the RWO draft PVC can't be mounted by two pods at once
  selector:
    matchLabels: { app: dotvirt }
  template:
    metadata:
      labels: { app: dotvirt }
    spec:
      serviceAccountName: dotvirt
      # Pull credential for registry.desku.be (create out-of-band):
      #   oc create secret docker-registry dotvirt-regcred -n dotvirt \
      #     --docker-server=registry.desku.be --docker-username=… --docker-password=…
      imagePullSecrets:
        - name: dotvirt-regcred
      containers:
        - name: dotvirt
          # Pinned to the main commit the image was built from (make push tags
          # both <short-sha> and latest).
          image: registry.desku.be/dotvirt:683363f
          args:
            - "-addr=:8080"
            - "-ui-origin=" # same-origin: SPA served behind the same Route
            - "-argo=true"
            - "-export-interval=30s"
            - "-draft-dir=/var/lib/dotvirt/drafts" # persisted (see volume) so drafts survive restarts
            # The Forgejo Route's cert isn't publicly trusted on this cluster;
            # covers git clones/pushes + the forge API. Metrics stays verified —
            # DOTVIRT_METRICS_CA takes precedence for that client.
            - "-insecure-tls"
          env:
            # Performance tab: the in-cluster Thanos querier, trusted via the
            # service-CA bundle mounted below — no -insecure-tls in-cluster.
            - name: DOTVIRT_METRICS_URL
              value: "https://thanos-querier.openshift-monitoring.svc.cluster.local:9091"
            - name: DOTVIRT_METRICS_CA
              value: "/etc/dotvirt/ca/service-ca.crt"
            # Instant updates: Forgejo webhooks deliver to PUBLIC_URL/api/webhooks/forge,
            # HMAC-signed with the webhook secret; dotvirt auto-registers the hook on
            # every project repo. Omit the secret to fall back to polling only.
            - name: DOTVIRT_PUBLIC_URL
              value: "https://dotvirt.apps.hetznet.epheo.eu" # the Route below
            - name: DOTVIRT_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef: { name: dotvirt-webhook, key: secret, optional: true }
            - name: DOTVIRT_GIT_USERNAME
              valueFrom: { secretKeyRef: { name: dotvirt-forge, key: username } }
            - name: DOTVIRT_GIT_TOKEN
              valueFrom: { secretKeyRef: { name: dotvirt-forge, key: token } }
            - name: DOTVIRT_FORGE_URL
              valueFrom: { secretKeyRef: { name: dotvirt-forge, key: url } }
            - name: DOTVIRT_FORGE_TOKEN
              valueFrom: { secretKeyRef: { name: dotvirt-forge, key: token } }
            - name: DOTVIRT_SESSION_SECRET
              valueFrom: { secretKeyRef: { name: dotvirt-session, key: secret } }
            # Shared bearer for the ArgoCD ApplicationSet plugin generator (must
            # match the dotvirt-appset-plugin secret in openshift-gitops). Enables
            # label-driven project provisioning; omit the secret to disable it.
            - name: DOTVIRT_APPSET_PLUGIN_TOKEN
              valueFrom:
                secretKeyRef: { name: dotvirt-appset-plugin, key: token, optional: true }
          ports:
            - { containerPort: 8080, name: http }
          volumeMounts:
            - { name: drafts, mountPath: /var/lib/dotvirt/drafts }
            - { name: service-ca, mountPath: /etc/dotvirt/ca, readOnly: true }
          readinessProbe:
            httpGet: { path: /api/healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: drafts
          persistentVolumeClaim: { claimName: dotvirt-drafts }
        - name: service-ca
          configMap: { name: dotvirt-service-ca }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dotvirt-drafts
  namespace: dotvirt
spec:
  accessModes: [ReadWriteOnce] # switch to ReadWriteMany to run replicas > 1
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: dotvirt
  namespace: dotvirt
spec:
  selector: { app: dotvirt }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
---
# OpenShift injects the service CA (which signs thanos-querier's serving cert)
# into this ConfigMap; the Deployment mounts it for DOTVIRT_METRICS_CA.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dotvirt-service-ca
  namespace: dotvirt
  annotations:
    service.beta.openshift.io/inject-cabundle: "true"
---
# The UI + API at one origin (so -ui-origin stays empty). Edge TLS at the
# router; WebSockets (inventory stream, VNC) ride the same Route.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: dotvirt
  namespace: dotvirt
spec:
  host: dotvirt.apps.hetznet.epheo.eu # matches DOTVIRT_PUBLIC_URL above
  to:
    kind: Service
    name: dotvirt
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
