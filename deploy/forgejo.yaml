apiVersion: v1
kind: Namespace
metadata:
  name: forgejo
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forgejo-data
  namespace: forgejo
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: lvms-vgfast
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  selector:
    matchLabels: {app: forgejo}
  strategy: {type: Recreate}
  template:
    metadata:
      labels: {app: forgejo}
    spec:
      containers:
      - name: forgejo
        image: codeberg.org/forgejo/forgejo:11
        ports:
        - {containerPort: 3000, name: http}
        env:
        - {name: FORGEJO__security__INSTALL_LOCK, value: "true"}
        - {name: FORGEJO__server__ROOT_URL, value: "https://forgejo.apps.hetznet.epheo.eu/"}
        - {name: FORGEJO__server__SSH_DOMAIN, value: "forgejo.apps.hetznet.epheo.eu"}
        - {name: FORGEJO__server__DOMAIN, value: "forgejo.apps.hetznet.epheo.eu"}
        - {name: FORGEJO__database__DB_TYPE, value: "sqlite3"}
        volumeMounts:
        - {name: data, mountPath: /data}
        readinessProbe:
          httpGet: {path: /api/healthz, port: 3000}
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: data
        persistentVolumeClaim: {claimName: forgejo-data}
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-http
  namespace: forgejo
spec:
  selector: {app: forgejo}
  ports:
  - {name: http, port: 3000, targetPort: 3000}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: forgejo
  namespace: forgejo
spec:
  host: forgejo.apps.hetznet.epheo.eu
  to: {kind: Service, name: forgejo-http}
  port: {targetPort: http}
  tls: {termination: edge, insecureEdgeTerminationPolicy: Redirect}
